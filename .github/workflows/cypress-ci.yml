name: Cypress Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── UI Tests — parallelised across 2 Cypress Cloud containers ──────────────
  ui-tests:
    name: UI Tests (container ${{ matrix.containers }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # keep running other containers if one fails
      matrix:
        containers: [1, 2]    # 2 parallel instances split by Cypress Cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run — UI (parallel)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/ui/**/*.cy.js
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-ui-${{ matrix.containers }}
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-ui-${{ matrix.containers }}
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report-ui-${{ matrix.containers }}
          path: cypress/reports
          if-no-files-found: ignore

  # ── API Tests ───────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run — API
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-api
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report-api
          path: cypress/reports
          if-no-files-found: ignore

  # ── Docker — full suite containerised ──────────────────────────────────────
  docker-tests:
    name: All Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t parabank-cypress .

      - name: Run all tests in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/cypress/screenshots:/app/cypress/screenshots \
            -v ${{ github.workspace }}/cypress/videos:/app/cypress/videos \
            -v ${{ github.workspace }}/cypress/reports:/app/cypress/reports \
            parabank-cypress npm run test:all

      - name: Upload Docker screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Docker videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
